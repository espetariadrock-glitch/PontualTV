name: Build Pontual TV APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar Gradle e gerar wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip
          unzip -q gradle-8.4-bin.zip -d /opt/gradle
          export PATH=$PATH:/opt/gradle/gradle-8.4/bin
          gradle wrapper --gradle-version 8.4

      - name: Permissão gradlew
        run: chmod +x gradlew

      - name: Build APK (debug — pronto para instalar via ADB)
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PontualTV-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
